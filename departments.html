<!DOCTYPE html>
<html>
<head>
    <title>Departments</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f6f8;
        }

        header {
            background-color: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #111827;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            padding: 20px;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Departments & VLANs</h1>
</header>

<nav>
    <a href="index.html">Home</a>
</nav>

<div class="container">

    <div class="card">
        <h2>Classroom 1</h2>
        <p>VLAN 20</p>
        <img src="https://via.placeholder.com/300" alt="Classroom">
    </div>

    <div class="card">
        <h2>Classroom 2</h2>
        <p>VLAN 40</p>
        <img src="https://via.placeholder.com/300" alt="Classroom">
    </div>

    <div class="card">
        <h2>Reception</h2>
        <p>VLAN 30</p>
        <img src="https://via.placeholder.com/300" alt="Reception">
    </div>

    <div class="card">
        <h2>Staff / Teachers</h2>
        <p>VLAN 88</p>
        <img src="https://via.placeholder.com/300" alt="Staff">
    </div>

</div>

</body>
</html>
